version: 2

project_name: burndown-cli

before:
  hooks:
    - go mod tidy

builds:
  - id: burndown-cli
    main: ./cmd/burndown-cli
    binary: burndown-cli
    env:
      - CGO_ENABLED=0
    goos:
      - darwin
    goarch:
      - arm64
      - amd64
    flags:
      - -trimpath
    ldflags:
      - -s -w
      - -X github.com/agent-burn-down/desktop-client/internal/version.Version={{.Version}}
      - -X github.com/agent-burn-down/desktop-client/internal/version.Commit={{.ShortCommit}}
      - -X github.com/agent-burn-down/desktop-client/internal/version.Date={{.Date}}

archives:
  - formats: [tar.gz]
    name_template: "{{ .ProjectName }}_{{ .Version }}_{{ .Os }}_{{ .Arch }}"

checksum:
  name_template: checksums.txt

changelog:
  sort: asc
  filters:
    exclude:
      - "^docs:"
      - "^chore:"

release:
  draft: false
